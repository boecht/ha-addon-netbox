name: Build and Publish NetBox Add-on

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
    paths:
    - "netbox/**"
    - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch_slug: amd64
            platform: linux/amd64
          - arch_slug: aarch64
            platform: linux/arm64
    env:
      REGISTRY: ghcr.io
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read add-on version
        id: addon_version
        run: |
          version=$(grep '^version:' netbox/config.yaml | head -1 | awk '{print $2}' | tr -d '"')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      # versions.yaml is the single source of truth (updated via scripts/sync_versions.py)
      - name: Load NetBox metadata
        id: netbox_version
        run: |
          NETBOX_VERSION=$(yq -r '.netbox.version' versions.yaml)
          NETBOX_DIGEST=$(yq -r '.netbox.digest_index' versions.yaml)
          {
            echo "netbox_version=${NETBOX_VERSION}"
            echo "netbox_digest=${NETBOX_DIGEST}"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize build inputs
        env:
          ARCH_SLUG: ${{ matrix.arch_slug }}
          PLATFORM: ${{ matrix.platform }}
          ADDON_VERSION: ${{ steps.addon_version.outputs.version }}
          NETBOX_VERSION: ${{ steps.netbox_version.outputs.netbox_version }}
          NETBOX_DIGEST: ${{ steps.netbox_version.outputs.netbox_digest }}
        run: |
          base_image=$(yq -r ".build_from.${ARCH_SLUG}" netbox/build.yaml)
          echo "Add-on version: ${ADDON_VERSION}"
          echo "Target architecture: ${ARCH_SLUG} (${PLATFORM})"
          echo "NetBox base image: ${NETBOX_VERSION} (${NETBOX_DIGEST})"
          echo "ARCH-specific base image reference: ${base_image}"

      - name: Run Dockerfile checks
        if: github.event_name != 'pull_request' || matrix.arch_slug == 'amd64'
        env:
          BUILDER_NAME: ${{ steps.buildx.outputs.name }}
          NETBOX_VERSION: ${{ steps.netbox_version.outputs.netbox_version }}
          NETBOX_DIGEST: ${{ steps.netbox_version.outputs.netbox_digest }}
        run: |
          docker buildx build \
            --builder "$BUILDER_NAME" \
            --check \
            --progress plain \
            -f netbox/Dockerfile \
            --build-arg BUILD_FROM="ghcr.io/netbox-community/netbox:${NETBOX_VERSION}@${NETBOX_DIGEST}" \
            netbox

      - name: Build and push ${{ matrix.arch_slug }} image
        if: github.event_name != 'pull_request' || matrix.arch_slug == 'amd64'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        env:
          NETBOX_VERSION: ${{ steps.netbox_version.outputs.netbox_version }}
          NETBOX_DIGEST: ${{ steps.netbox_version.outputs.netbox_digest }}
        with:
          context: ./netbox
          file: netbox/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ env.REGISTRY }}/boecht/ha-addon-netbox/netbox-${{ matrix.arch_slug }}:${{ steps.addon_version.outputs.version }}
            ${{ env.REGISTRY }}/boecht/ha-addon-netbox/netbox-${{ matrix.arch_slug }}:latest
          build-args: |
            BUILD_FROM=ghcr.io/netbox-community/netbox:${{ steps.netbox_version.outputs.netbox_version }}@${{ steps.netbox_version.outputs.netbox_digest }}
            IMAGE_COMMIT=${{ github.sha }}
            IMAGE_SOURCE=${{ github.repository }}
            IMAGE_TAG=${{ steps.addon_version.outputs.version }}
          provenance: false
          sbom: false

      - name: Tag commit with add-on version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.arch_slug == 'amd64'
        env:
          VERSION: ${{ steps.addon_version.outputs.version }}
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git tag -f "$VERSION" "$GITHUB_SHA"
          git push origin --force "$VERSION"
